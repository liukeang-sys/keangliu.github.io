<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #ffffff; --bg2: #f6f6f4; --ink: #0f0f0e;

  nav {
    position: sticky; top: 0; z-index: 200;
    display: flex; justify-content: space-between; align-items: center;

  .nav-logo { font-family: 'Instrument Serif', serif; font-size: 19px; letter-spacing: -0.01em; color: var(--ink); text-decoration: none; }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color .2s; }
  .nav-links a:hover { color: var(--ink); }
  .nav-btn { font-family: 'Instrument Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; background: var(--ink); color: #fff; border: none; padding: 10px 24px; cursor: pointer; transition: background .2s; text-decoration: none; }
  .nav-btn:hover { background: var(--blue); }
  .coming-soon {
    min-height: calc(100vh - 65px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 80px 56px;
    border-bottom: 1px solid var(--border);

  .cs-tag { font-size: 10px; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 24px; }
  .cs-title { font-family: 'Instrument Serif', serif; font-size: clamp(56px, 8vw, 96px); line-height: 0.92; letter-spacing: -0.03em; margin-bottom: 24px; }
  .cs-title .blue-italic { font-style: italic; color: var(--blue); }
  .cs-sub { font-size: 15px; color: var(--muted); max-width: 400px; line-height: 1.8; margin-bottom: 40px; }
  .back-btn { font-family: 'Instrument Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; background: var(--ink); color: #fff; padding: 13px 28px; text-decoration: none; transition: background .2s; }
  .back-btn:hover { background: var(--blue); }
  footer { display: flex; justify-content: space-between; align-items: center; padding: 20px 56px; border-top: 1px solid var(--border); }
  .footer-copy { font-size: 12px; color: var(--muted); }
